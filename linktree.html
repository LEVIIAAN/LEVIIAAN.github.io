<!DOCTYPE html>
<html lang="en">
<head>
    <title>Casio Linktree</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #dcdcdc;
        }

        .card {
            width: 350px;
            margin: 30px auto;
            background: #f2f2f2;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: auto;
        }

        h2 {
            margin: 10px 0;
        }

        .section-title {
            margin-top: 20px;
            font-weight: bold;
        }

        .btn-link {
            background: #2f3a3d;
            color: white;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            display: block;
            text-decoration: none;
        }

        .btn-link:hover {
            background: #1f2628;
        }

        .join-btn {
            margin: 25px auto;
            padding: 10px;
            background: white;
            border-radius: 20px;
            width: 250px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .footer {
            font-size: 12px;
            margin-top: 20px;
        }

        .footer a {
            color: black;
            text-decoration: none;
            margin: 0 5px;
        }

    </style>
</head>

<body>

<div class="card">

    <!-- Logo -->
    <img src="asset1/casio.jpg" class="logo">

    <h2>@casiostore_id</h2>
    <p>AUTHORIZED DEALER</p>

    <!-- Tiktok -->
    <a href="https://www.tiktok.com" class="btn-link" target="_blank">OFFICIAL TIKTOK</a>

    <!-- Website -->
    <div class="section-title">OFFICIAL WEBSITE</div>
    <a href="https://www.casio.com" class="btn-link" target="_blank">Casio Official Website</a>

    <!-- E-Commerce -->
    <div class="section-title">OFFICIAL E-COMMERCE</div>
    <a href="https://shopee.co.id" class="btn-link" target="_blank">SHOPEE</a>
    <a href="https://tokopedia.com" class="btn-link" target="_blank">TOKOPEDIA</a>
    <a href="https://lazada.co.id" class="btn-link" target="_blank">LAZADA</a>

    <!-- Join -->
    <div class="join-btn">
        Join casiostore_id on Linktree
    </div>

    <!-- Footer -->
    <div class="footer">
        <a href="#">Cookie Preferences</a> •
        <a href="#">Report</a> •
        <a href="#">Privacy</a> •
        <a href="#">Explore</a>
    </div>

</div>

</body>
</html>
